{% extends "base.html" %}

{% block content %}
<h2 class="text-3xl font-bold mb-4">Report Missing Person</h2>

<form hx-post="/cases/new" hx-target="#alerts" hx-swap="beforeend" class="space-y-3">
    <input type="text" name="name" placeholder="Full Name" class="input input-bordered w-full">
    <input type="text" name="last_seen" placeholder="Last Seen Location" class="input input-bordered w-full">
    <input type="date" name="last_seen_date" class="input input-bordered w-full">
    <textarea name="notes" placeholder="Additional Notes" class="textarea textarea-bordered w-full"></textarea>
    <button type="submit" class="btn btn-primary w-full">Submit Report</button>
</form>

<div id="alerts" class="mt-4"></div>
{% endblock %}
